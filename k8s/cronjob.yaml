apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: packaging-data
  namespace: ci-cd
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ceph-filesystem
  resources:
    requests:
      storage: 10Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: packaging-ci
  namespace: ci-cd
spec:
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          nodeSelector:
            kubernetes.io/arch: amd64
          restartPolicy: Never
          imagePullSecrets:
            - name: ghcr-credentials
          containers:
            - name: ci
              image: ghcr.io/daedaluz/go-deb-ci:latest
              imagePullPolicy: Always
              command: ["ci.sh", "/data/pkg"]
              env:
                - name: SSH_CLONE
                  value: "1"
              volumeMounts:
                - name: data
                  mountPath: /data
                - name: ssh-keys
                  mountPath: /root/.ssh
                  readOnly: true
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: packaging-data
            - name: ssh-keys
              secret:
                secretName: ci-cd-ssh-keys
                defaultMode: 0600
